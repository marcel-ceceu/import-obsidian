<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background paper -->
  <rect width="512" height="512" fill="#F8F5F0"/>

  <!-- Border interno tipo carimbo -->
  <rect x="40" y="40" width="432" height="432" fill="none" stroke="#1A1614" stroke-width="3"/>
  <rect x="56" y="56" width="400" height="400" fill="none" stroke="#1A1614" stroke-width="1" opacity="0.4"/>

  <!-- Tag de versão monospace pequeno -->
  <text x="80" y="100" font-family="JetBrains Mono, monospace" font-size="18" font-weight="500" fill="#7A716A" letter-spacing="2">
    PIPELINE · v5
  </text>

  <!-- Numero romano 01 estilo serif manual -->
  <text x="80" y="280" font-family="Instrument Serif, Georgia, serif" font-size="220" font-style="italic" fill="#B53D2A" letter-spacing="-8">
    CV
  </text>

  <!-- Linha decorativa -->
  <line x1="80" y1="320" x2="432" y2="320" stroke="#1A1614" stroke-width="2"/>

  <!-- Caption manual -->
  <text x="80" y="370" font-family="Instrument Serif, Georgia, serif" font-size="36" font-style="italic" fill="#1A1614">
    Claude · Vault
  </text>
  <text x="80" y="410" font-family="JetBrains Mono, monospace" font-size="16" fill="#7A716A" letter-spacing="2">
    SYNC TO OBSIDIAN
  </text>

  <!-- Carimbo carmesim canto inferior direito -->
  <g transform="translate(360, 410) rotate(-8)">
    <rect x="0" y="0" width="80" height="36" fill="none" stroke="#B53D2A" stroke-width="2.5"/>
    <text x="40" y="25" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" font-weight="700" fill="#B53D2A" letter-spacing="2">
      MVP
    </text>
  </g>
</svg>
